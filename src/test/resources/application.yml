# 테스트도 운영과 동일하게 PostgreSQL로 수행한다 (H2 미사용).
# CI/로컬에서 테스트 전 PostgreSQL과 테스트 DB(ifrs17_test)가 준비되어 있어야 한다.
# 접속정보는 환경변수(TEST_DB_URL/USER/PASSWORD)로 오버라이드할 수 있다.
spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/ifrs17_test}
    username: ${TEST_DB_USER:ifrs17_app}
    password: ${TEST_DB_PASSWORD:ifrs17_app_pw}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: business_service
  flyway:
    enabled: true
    schemas: business_service
    default-schema: business_service
    locations: classpath:db/migration

business-service:
  audit:
    fail-closed: false
