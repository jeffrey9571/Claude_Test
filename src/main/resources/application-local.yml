# 로컬 데모용 프로파일: PostgreSQL 설치 없이 H2 인메모리로 실행한다.
#   실행: java -jar target/ifrs17-business-service-layer.jar --spring.profiles.active=local
# 운영(기본 프로파일)은 application.yml의 PostgreSQL 설정을 그대로 사용한다.
spring:
  datasource:
    url: jdbc:h2:mem:ifrs17_bsl;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: business_service
  flyway:
    enabled: true
    schemas: business_service
    default-schema: business_service
    locations: classpath:db/migration
  # H2 웹 콘솔(선택): http://localhost:8080/h2-console 에서 DB를 직접 조회할 수 있다.
  h2:
    console:
      enabled: true
      path: /h2-console

business-service:
  audit:
    fail-closed: false
